<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>GlyphOS - DRAGON Viewport</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "inverse-on-surface": "#565555",
              "tertiary": "#7ca0ff",
              "surface": "#0e0e0e",
              "secondary": "#0dc4fe",
              "on-tertiary-fixed": "#001541",
              "surface-dim": "#0e0e0e",
              "on-primary-fixed-variant": "#004a5a",
              "outline-variant": "#484847",
              "tertiary-fixed": "#92aeff",
              "secondary-dim": "#00b6ec",
              "on-primary": "#00414f",
              "tertiary-container": "#6b92f7",
              "on-secondary": "#00394d",
              "on-tertiary-fixed-variant": "#003386",
              "error": "#ff716c",
              "on-tertiary-container": "#00143f",
              "on-primary-fixed": "#002a34",
              "primary-fixed-dim": "#28c0e4",
              "surface-container-low": "#131313",
              "secondary-fixed-dim": "#65d0ff",
              "inverse-primary": "#00687e",
              "primary-fixed": "#40cef3",
              "outline": "#767575",
              "on-error": "#490006",
              "on-primary-container": "#002c37",
              "error-dim": "#d7383b",
              "background": "#0e0e0e",
              "surface-container": "#1a1919",
              "primary": "#40cef3",
              "surface-container-high": "#201f1f",
              "surface-container-lowest": "#000000",
              "on-surface-variant": "#adaaaa",
              "inverse-surface": "#fcf9f8",
              "error-container": "#9f0519",
              "secondary-fixed": "#93dbff",
              "on-secondary-fixed-variant": "#005773",
              "primary-container": "#04b5d9",
              "on-surface": "#ffffff",
              "on-tertiary": "#00215d",
              "on-background": "#ffffff",
              "surface-container-highest": "#262626",
              "primary-dim": "#28c0e4",
              "surface-variant": "#262626",
              "on-secondary-container": "#f1f9ff",
              "secondary-container": "#006686",
              "on-secondary-fixed": "#00394c",
              "surface-tint": "#40cef3",
              "on-error-container": "#ffa8a3",
              "tertiary-fixed-dim": "#7ca0ff",
              "surface-bright": "#2c2c2c",
              "tertiary-dim": "#749aff"
            },
            fontFamily: {
              "headline": ["Space Grotesk"],
              "body": ["Space Grotesk"],
              "label": ["Space Grotesk"]
            },
            borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
          },
        },
      }
    </script>
<style>
        body {
            background-color: #0d0d0d;
            font-family: 'Space Grotesk', sans-serif;
            margin: 0;
            padding: 0;
            width: 720px;
            height: 1280px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            color: #ffffff;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glyph-header-line {
            height: 1px;
            background: #40cef3;
            width: 100%;
            position: relative;
        }
        .glyph-header-line::after {
            content: '';
            position: absolute;
            right: 0;
            top: 0;
            border-style: solid;
            border-width: 0 8px 8px 0;
            border-color: transparent #40cef3 transparent transparent;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-[#0D0D0D]">
<!-- TopAppBar (Shared Component) -->
<header class="fixed top-0 w-full z-50 flex items-center justify-between px-6 h-16 bg-[#0E0E0E] border-b border-[#484847]/20 shadow-[0_0_40px_rgba(64,206,243,0.1)]">
<div class="flex items-center gap-2">
<span class="text-xs font-bold tracking-widest text-primary">21:42</span>
<span class="material-symbols-outlined text-primary scale-95 active:opacity-80" data-icon="schedule">schedule</span>
</div>
<div class="flex flex-col items-center">
<h1 class="text-[#40CEF3] font-bold tracking-[0.2em] text-xl font-['Space_Grotesk'] uppercase">DRAGON</h1>
<div class="w-12 h-[1px] bg-primary mt-1"></div>
</div>
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary" data-icon="wifi">wifi</span>
<span class="material-symbols-outlined text-primary scale-95 active:opacity-80" data-icon="battery_charging_full">battery_charging_full</span>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col items-center justify-center pt-16 relative">
<!-- Header Label -->
<div class="mb-8 flex flex-col items-center">
<span class="text-[10px] tracking-[0.4em] text-outline-variant font-bold uppercase mb-1">SYSTEM_NODE</span>
<h2 class="text-primary font-bold tracking-[0.3em] text-3xl font-headline">DRAGON</h2>
</div>
<!-- Viewport Module -->
<div class="w-[672px] h-[600px] bg-surface-container-lowest border border-primary rounded-[16px] relative flex flex-col items-center justify-center shadow-[0_0_60px_rgba(64,206,243,0.05)]">
<!-- Corner Technical Accents -->
<div class="absolute top-4 left-4 border-l border-t border-primary/40 w-4 h-4"></div>
<div class="absolute top-4 right-4 border-r border-t border-primary/40 w-4 h-4"></div>
<div class="absolute bottom-4 left-4 border-l border-b border-primary/40 w-4 h-4"></div>
<div class="absolute bottom-4 right-4 border-r border-b border-primary/40 w-4 h-4"></div>
<!-- Play UI -->
<div class="flex flex-col items-center group cursor-pointer transition-transform duration-300 active:scale-95">
<div class="w-24 h-24 rounded-full border border-primary flex items-center justify-center mb-6 bg-primary/5 group-hover:bg-primary/10 transition-colors">
<span class="material-symbols-outlined text-primary text-5xl" data-icon="play_arrow" style="font-variation-settings: 'FILL' 1;">play_arrow</span>
</div>
<span class="text-primary tracking-[0.2em] font-medium text-lg uppercase">MJPEG Stream</span>
</div>
<!-- Viewport Metadata (Bottom Edge) -->
<div class="absolute bottom-4 w-full px-8 flex justify-between items-center text-[10px] font-mono text-primary/60 tracking-widest uppercase">
<span>ENC: H.264 / 1080P</span>
<span>LATENCY: 42MS</span>
</div>
</div>
<!-- Status Info Below Viewport -->
<div class="mt-8 flex flex-col items-center">
<div class="flex items-center gap-3">
<span class="w-2 h-2 rounded-full bg-primary animate-pulse shadow-[0_0_8px_#40cef3]"></span>
<span class="text-primary text-[18px] font-medium tracking-[0.1em] font-headline uppercase">Streaming 15.2 FPS</span>
</div>
<div class="mt-4 flex gap-4">
<div class="px-3 py-1 bg-surface-container-high border border-outline-variant/20">
<span class="text-[10px] text-primary/80 font-bold tracking-tighter uppercase">[ REC ]</span>
</div>
<div class="px-3 py-1 bg-surface-container-high border border-outline-variant/20">
<span class="text-[10px] text-primary/80 font-bold tracking-tighter uppercase">[ LIVE ]</span>
</div>
</div>
</div>
<!-- Right Side Page Indicators -->
<nav class="absolute right-6 top-1/2 -translate-y-1/2 flex flex-col gap-4">
<div class="w-1.5 h-1.5 rounded-full bg-outline-variant/40"></div>
<div class="w-1.5 h-1.5 rounded-full bg-outline-variant/40"></div>
<div class="w-2.5 h-2.5 rounded-full bg-primary shadow-[0_0_10px_#40cef3]"></div>
<div class="w-1.5 h-1.5 rounded-full bg-outline-variant/40"></div>
<div class="w-1.5 h-1.5 rounded-full bg-outline-variant/40"></div>
</nav>
<!-- Ambient Data Clusters -->
<div class="absolute bottom-12 left-6 text-left">
<p class="text-[10px] text-outline-variant font-mono leading-tight">
                NET_LINK: STABLE<br/>
                AUTH_KEY: *********<br/>
                DRAGON_OS: V2.4.1
            </p>
</div>
<div class="absolute bottom-12 right-6 text-right">
<p class="text-[10px] text-outline-variant font-mono leading-tight uppercase">
                Grid System Active<br/>
                Thermal: 34°C<br/>
                Uptime: 14:02:55
            </p>
</div>
</main>
<!-- Bottom Aesthetic Edge (No Nav) -->
<footer class="h-8 w-full flex items-center justify-center">
<div class="w-1/3 h-[2px] bg-outline-variant/10 rounded-full"></div>
</footer>
</body></html>
