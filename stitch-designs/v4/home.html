<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=720, height=1280, initial-scale=1"/>
<title>Glyph OS — Home</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 720px; height: 1280px;
    background: #0A0A0C;
    color: #E8ECF1;
    font-family: 'Inter', sans-serif;
    overflow: hidden;
    position: relative;
  }

  /* === Ambient background — subtle radial warmth, not flat black === */
  .ambient {
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse 600px 400px at 360px 520px, rgba(0,229,255,0.03) 0%, transparent 70%),
      radial-gradient(ellipse 300px 800px at 100px 900px, rgba(0,229,255,0.015) 0%, transparent 60%);
    pointer-events: none;
  }

  /* === Scan lines — subtle CRT texture === */
  .scanlines {
    position: absolute; inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,229,255,0.008) 2px, rgba(0,229,255,0.008) 4px);
    pointer-events: none;
  }

  /* === Status bar === */
  .status-bar {
    position: absolute; top: 0; left: 0; right: 0;
    height: 48px;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 24px;
    z-index: 10;
  }
  .status-time {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 600; font-size: 14px;
    color: #8B95A5;
    letter-spacing: 0.05em;
  }
  .status-badge {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 9px; font-weight: 700;
    letter-spacing: 0.35em;
    color: #00E5FF;
    border: 1px solid rgba(0,229,255,0.2);
    padding: 3px 10px;
    text-transform: uppercase;
  }
  .status-icons {
    display: flex; gap: 8px; color: #4A5568; font-size: 14px;
  }
  .status-icons span { font-size: 16px; }

  /* === The Chronograph — editorial oversized time === */
  .chronograph {
    position: absolute;
    top: 140px; left: 40px;
  }
  .chrono-time {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 96px;
    font-weight: 300;
    letter-spacing: -0.04em;
    line-height: 0.9;
    color: #E8ECF1;
  }
  .chrono-date {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 15px;
    font-weight: 400;
    color: #4A5568;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-top: 12px;
  }

  /* === The Orb — the soul of Glyph === */
  .orb-container {
    position: absolute;
    top: 380px;
    left: 50%; transform: translateX(-50%);
    width: 200px; height: 200px;
    display: flex; align-items: center; justify-content: center;
  }
  /* Outermost haze */
  .orb-haze {
    position: absolute;
    width: 200px; height: 200px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(0,229,255,0.08) 0%, transparent 70%);
    animation: breathe 4s ease-in-out infinite;
  }
  /* Middle ring */
  .orb-ring {
    position: absolute;
    width: 140px; height: 140px;
    border-radius: 50%;
    border: 1px solid rgba(0,229,255,0.15);
    animation: breathe 4s ease-in-out infinite 0.5s;
  }
  /* Inner core */
  .orb-core {
    position: absolute;
    width: 80px; height: 80px;
    border-radius: 50%;
    background: radial-gradient(circle at 40% 35%,
      rgba(0,229,255,0.6) 0%,
      rgba(0,229,255,0.3) 40%,
      rgba(0,229,255,0.05) 70%,
      transparent 100%);
    box-shadow:
      0 0 40px rgba(0,229,255,0.2),
      0 0 80px rgba(0,229,255,0.1),
      inset 0 0 20px rgba(0,229,255,0.1);
    animation: corePulse 4s ease-in-out infinite;
  }
  /* Tiny orbiting particle */
  .orb-particle {
    position: absolute;
    width: 4px; height: 4px;
    border-radius: 50%;
    background: #00E5FF;
    box-shadow: 0 0 6px #00E5FF;
    animation: orbit 8s linear infinite;
    offset-path: circle(70px);
  }
  .orb-particle:nth-child(2) {
    width: 2px; height: 2px;
    opacity: 0.5;
    animation-duration: 12s;
    animation-direction: reverse;
    offset-path: circle(85px);
  }
  .orb-label {
    position: absolute;
    bottom: -28px;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 10px;
    letter-spacing: 0.4em;
    color: #00A3B3;
    text-transform: uppercase;
  }

  @keyframes breathe {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.08); opacity: 0.7; }
  }
  @keyframes corePulse {
    0%, 100% { transform: scale(1); box-shadow: 0 0 40px rgba(0,229,255,0.2), 0 0 80px rgba(0,229,255,0.1); }
    50% { transform: scale(1.04); box-shadow: 0 0 60px rgba(0,229,255,0.3), 0 0 100px rgba(0,229,255,0.15); }
  }
  @keyframes orbit {
    from { offset-distance: 0%; }
    to { offset-distance: 100%; }
  }

  /* === Contextual intel — asymmetric, editorial === */
  .intel-layer {
    position: absolute;
    bottom: 200px; left: 0; right: 0;
    padding: 0 32px;
  }
  .intel-row {
    display: flex; gap: 12px;
    margin-bottom: 12px;
  }
  .intel-card {
    flex: 1;
    background: rgba(22,25,32,0.6);
    backdrop-filter: blur(4px);
    padding: 20px;
    border-left: 2px solid rgba(0,229,255,0.15);
    position: relative;
  }
  .intel-card.wide { flex: none; width: 100%; }
  .intel-overline {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 9px;
    letter-spacing: 0.3em;
    color: #4A5568;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .intel-value {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 28px;
    font-weight: 500;
    color: #E8ECF1;
    line-height: 1;
  }
  .intel-caption {
    font-size: 12px;
    color: #4A5568;
    margin-top: 6px;
  }
  .intel-value.accent { color: #00E5FF; }

  /* AI insight — different feel, more organic */
  .insight {
    background: transparent;
    border-left: 2px solid rgba(0,229,255,0.3);
    padding: 16px 20px;
    position: relative;
  }
  .insight::before {
    content: '';
    position: absolute; left: -2px; top: 0;
    width: 2px; height: 8px;
    background: #00E5FF;
    box-shadow: 0 0 8px #00E5FF;
  }
  .insight-text {
    font-size: 14px;
    color: #8B95A5;
    line-height: 1.5;
    font-style: italic;
  }
  .insight-tag {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 9px;
    letter-spacing: 0.3em;
    color: #00A3B3;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  /* === Page dots — right edge === */
  .page-dots {
    position: absolute;
    right: 20px;
    top: 50%; transform: translateY(-50%);
    display: flex; flex-direction: column; gap: 12px;
    align-items: center;
  }
  .dot {
    width: 6px; height: 6px;
    background: #1E222B;
    transition: all 0.3s;
  }
  .dot.active {
    width: 6px; height: 20px;
    background: #00E5FF;
    box-shadow: 0 0 8px rgba(0,229,255,0.4);
  }

  /* === Bottom nav === */
  .bottom-nav {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 72px;
    display: flex; align-items: center; justify-content: space-around;
    padding: 0 40px;
    background: linear-gradient(to top, #0A0A0C 60%, transparent);
  }
  .nav-item {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    color: #2D3444;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 9px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: pointer;
  }
  .nav-item.active { color: #00E5FF; }
  .nav-item .icon { font-size: 22px; }
  .nav-item.active .icon { filter: drop-shadow(0 0 6px rgba(0,229,255,0.4)); }

  /* === Side HUD text === */
  .hud-left {
    position: absolute;
    left: 12px;
    bottom: 200px;
    writing-mode: vertical-rl;
    text-orientation: mixed;
    transform: rotate(180deg);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 8px;
    letter-spacing: 0.3em;
    color: rgba(75,85,99,0.3);
    text-transform: uppercase;
  }
</style>
</head>
<body>
  <div class="ambient"></div>
  <div class="scanlines"></div>

  <!-- Status Bar -->
  <div class="status-bar">
    <span class="status-time">21:42</span>
    <span class="status-badge">Glyph</span>
    <div class="status-icons">
      <span>⚡</span>
      <span>●</span>
    </div>
  </div>

  <!-- The Chronograph -->
  <div class="chronograph">
    <div class="chrono-time">21:42</div>
    <div class="chrono-date">Thursday · March 27</div>
  </div>

  <!-- The Orb -->
  <div class="orb-container">
    <div class="orb-haze"></div>
    <div class="orb-ring"></div>
    <div class="orb-core"></div>
    <div class="orb-particle"></div>
    <div class="orb-particle"></div>
    <span class="orb-label">Ready</span>
  </div>

  <!-- Intelligence Layer -->
  <div class="intel-layer">
    <div class="intel-row">
      <div class="intel-card">
        <div class="intel-overline">Ambient</div>
        <div class="intel-value">23°</div>
        <div class="intel-caption">Clear · Light breeze</div>
      </div>
      <div class="intel-card">
        <div class="intel-overline">Next</div>
        <div class="intel-value accent" style="font-size: 20px;">Team Sync</div>
        <div class="intel-caption">2:00 PM · 3h 18m away</div>
      </div>
    </div>
    <div class="insight">
      <div class="insight-tag">Glyph thinks</div>
      <div class="insight-text">"Rain by 4pm — might want to grab an umbrella before the sync."</div>
    </div>
  </div>

  <!-- Side HUD -->
  <div class="hud-left">sys · neural_v2 · 0.002ms</div>

  <!-- Page Dots -->
  <div class="page-dots">
    <div class="dot active"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>

  <!-- Bottom Nav -->
  <div class="bottom-nav">
    <div class="nav-item active">
      <span class="icon">⬡</span>
      <span>Home</span>
    </div>
    <div class="nav-item">
      <span class="icon">⊞</span>
      <span>Apps</span>
    </div>
    <div class="nav-item">
      <span class="icon">◈</span>
      <span>Dragon</span>
    </div>
    <div class="nav-item">
      <span class="icon">⚙</span>
      <span>Sys</span>
    </div>
  </div>
</body>
</html>
