<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
            text-transform: none;
            letter-spacing: normal;
            word-wrap: normal;
            white-space: nowrap;
            direction: ltr;
        }
        .glyph-header-line {
            height: 1px;
            width: 100%;
            background: linear-gradient(to right, #40cef3 0%, rgba(64, 206, 243, 0) 100%);
            position: relative;
        }
        .glyph-header-line::after {
            content: '';
            position: absolute;
            right: 0;
            top: 0;
            width: 8px;
            height: 8px;
            border-right: 1px solid #40cef3;
            border-top: 1px solid #40cef3;
            transform: translateY(-50%) rotate(45deg);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-background text-on-surface font-body overflow-hidden">
<!-- TopAppBar -->
<header class="bg-[#0E0E0E] text-[#FFB800] font-['Space_Grotesk'] uppercase tracking-[0.05em] text-sm font-bold docked full-width top-0 border-b border-[#FFB800]/20 shadow-[0_0_15px_rgba(255,184,0,0.1)] flex justify-between items-center w-full px-6 h-16 z-50">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-lg" data-icon="terminal">terminal</span>
<h1 class="text-lg font-black text-[#FFB800] tracking-tighter">GLYPH_OS_V4</h1>
</div>
<div class="flex items-center gap-4">
<span class="text-[10px] opacity-60">SBC_ACTIVE</span>
<span class="material-symbols-outlined text-lg" data-icon="battery_charging_full">battery_charging_full</span>
</div>
</header>
<main class="relative h-[calc(100vh-64px-80px)] px-4 pt-4 flex flex-col gap-4">
<!-- Dragon Browser Viewport -->
<div class="relative flex-1 w-full bg-surface-container-lowest border border-outline-variant/20 rounded-xl overflow-hidden group">
<!-- The Glyph Header Accent -->
<div class="absolute top-0 left-0 w-full p-2 z-10 flex justify-between items-start pointer-events-none">
<div class="glyph-header-line w-32"></div>
<div class="text-[10px] font-label text-primary/40 uppercase tracking-widest bg-background/60 backdrop-blur px-2 py-1">
                    [ Stream_01 // 720p_Raw ]
                </div>
</div>
<!-- Main Viewport Stream Content -->
<div class="w-full h-full flex items-center justify-center bg-[#050505]">
<img alt="Browser Stream" class="w-full h-full object-cover opacity-80 brightness-75 contrast-125 mix-blend-screen" data-alt="Technical browser interface with neon cyan circuit board overlays and dark digital data visualization nodes on a deep black background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuD5MtwFH7FaPBcFo-AOWOw_lxpBCsbtGBAnoKWG5ZjuTIdXAsgu9C9kBRxpOlD5Su_W-bvwXfGHFTCuUHXRdDNTPkAfUiBbBendOLKeaMoojtKA0syBZ4e9q0-Sav_jjpz9JwMy44n0fP-m-Ze_11nFVtjQvebF3sZkL23l3zhfMTvgkFxyOdDDZWyMDE8Rw0gPeM3cGRtPUVsD_MI1UZ2WrHyupuIVKjcyhV9Pgbyfq-04cf9q9W-3sfdMN6khtP5uSgCPd68SXiw"/>
<!-- Overlay Elements -->
<div class="absolute inset-0 pointer-events-none border border-primary/10 m-4"></div>
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-8 h-8 border border-primary/30 flex items-center justify-center">
<div class="w-1 h-1 bg-primary"></div>
</div>
</div>
<!-- Viewport Bottom Metadata -->
<div class="absolute bottom-4 left-4 right-4 flex justify-between items-end">
<div class="flex flex-col gap-1">
<div class="text-primary font-bold text-xs tracking-tighter bg-primary/10 px-2 py-0.5 inline-block">DRAGON_LINK_STABLE</div>
<div class="text-[10px] text-white/40 font-mono">LATENCY: 12ms // PACKET_LOSS: 0.0%</div>
</div>
<div class="w-24 h-8 bg-surface-container-high/40 backdrop-blur-md border border-outline-variant/20 p-1 flex items-center gap-1">
<div class="h-full w-1/4 bg-primary/20"></div>
<div class="h-full w-1/4 bg-primary/40"></div>
<div class="h-full w-1/4 bg-primary/60"></div>
<div class="h-full w-1/4 bg-primary"></div>
</div>
</div>
</div>
<!-- Connection Status & Controls Section -->
<section class="flex flex-col gap-4">
<!-- Status Bar -->
<div class="flex items-center justify-between px-2">
<div class="flex items-center gap-2">
<div class="w-1.5 h-1.5 rounded-full bg-primary shadow-[0_0_8px_#40cef3]"></div>
<span class="text-[11px] font-label text-primary font-medium tracking-widest uppercase">Connected · 15 FPS</span>
</div>
<div class="text-[10px] font-label text-white/30 uppercase">ID: DRG-992-X</div>
</div>
<!-- Action Controls -->
<div class="flex gap-3">
<button class="flex-1 bg-gradient-to-br from-primary to-primary-container text-on-primary py-3 font-label font-bold uppercase tracking-widest text-xs flex items-center justify-center gap-2 transition-all active:scale-95">
<span class="material-symbols-outlined text-sm" style="font-variation-settings: 'FILL' 1;">videocam</span>
                    Live
                </button>
<button class="flex-1 border border-primary text-primary py-3 font-label font-bold uppercase tracking-widest text-xs flex items-center justify-center gap-2 transition-all active:scale-95 rounded-xl">
<span class="material-symbols-outlined text-sm">edit_square</span>
                    Annotate
                </button>
</div>
</section>
<!-- Sidebar / Contextual Data Cluster (Asymmetric Balance) -->
<div class="mt-2 grid grid-cols-2 gap-3 pb-8">
<div class="bg-surface-container-low p-3 border-l border-primary/40">
<div class="text-[10px] text-white/40 uppercase mb-1">System Load</div>
<div class="text-lg font-headline font-black text-white leading-none">42.8%</div>
</div>
<div class="bg-surface-container-low p-3 border-l border-[#FFB800]/40">
<div class="text-[10px] text-white/40 uppercase mb-1">Dragon Temp</div>
<div class="text-lg font-headline font-black text-[#FFB800] leading-none">54°C</div>
</div>
</div>
</main>
<!-- BottomNavBar -->
<nav class="bg-[#0E0E0E]/90 backdrop-blur-xl fixed bottom-0 left-0 w-full z-50 flex justify-around items-center border-t border-white/5">

<span class="material-symbols-outlined" data-icon="commander">admin</span>
<span class="font-['Space_Grotesk'] font-medium uppercase text-[10px] mt-1">Terminal</span>
</a>
<a class="flex flex-col items-center justify-center bg-[#FFB800]/10 text-[#FFB800] brightness-125 rounded-none border-t-2 border-[#FFB800] p-4 transition-all duration-150 active:scale-90" href="#">
<span class="material-symbols-outlined" data-icon="explore">explore</span>
<span class="font-['Space_Grotesk'] font-medium uppercase text-[10px] mt-1">Browser</span>
</a>
<a class="flex flex-col items-center justify-center text-white/30 p-4 hover:bg-white/5 hover:text-white/80 transition-all duration-150 active:scale-90" href="#">
<span class="material-symbols-outlined" data-icon="auto_awesome">auto_awesome</span>
<span class="font-['Space_Grotesk'] font-medium uppercase text-[10px] mt-1">Intelligence</span>
</a>
<a class="flex flex-col items-center justify-center text-white/30 p-4 hover:bg-white/5 hover:text-white/80 transition-all duration-150 active:scale-90" href="#">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
<span class="font-['Space_Grotesk'] font-medium uppercase text-[10px] mt-1">System</span>
</a>
</nav>
