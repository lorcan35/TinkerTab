<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&amp;family=Manrope:wght@200;300;400&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        @keyframes pulse-glow {
            0%, 100% { transform: scale(1); opacity: 0.8; filter: blur(20px); }
            50% { transform: scale(1.1); opacity: 1; filter: blur(35px); }
        }
        .orb-glow {
            animation: pulse-glow 4s ease-in-out infinite;
        }
        .material-symbols-outlined {
            font-variation-settings: 'WHT' 100;
            font-size: 16px;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              colors: {
                "on-primary": "#412d00",
                "secondary": "#c8c6c5",
                "surface": "#131313",
                "surface-variant": "#353534",
                "inverse-primary": "#7c5800",
                "inverse-surface": "#e5e2e1",
                "on-background": "#e5e2e1",
                "on-surface-variant": "#d5c4ab",
                "error": "#ffb4ab",
                "on-surface": "#e5e2e1",
                "error-container": "#93000a",
                "on-secondary-fixed": "#1c1b1b",
                "on-primary-container": "#6b4c00",
                "inverse-on-surface": "#313030",
                "surface-container": "#201f1f",
                "secondary-fixed-dim": "#c8c6c5",
                "on-secondary-fixed-variant": "#474746",
                "on-tertiary-fixed-variant": "#004e5d",
                "primary-fixed": "#ffdea8",
                "on-error": "#690005",
                "on-primary-fixed-variant": "#5e4200",
                "on-primary-fixed": "#271900",
                "surface-dim": "#131313",
                "secondary-container": "#474746",
                "surface-bright": "#3a3939",
                "primary-container": "#ffb800",
                "on-secondary": "#313030",
                "background": "#131313",
                "outline": "#9e8f78",
                "surface-tint": "#ffba20",
                "surface-container-lowest": "#0e0e0e",
                "primary": "#ffdca1",
                "surface-container-high": "#2a2a2a",
                "on-tertiary-fixed": "#001f27",
                "tertiary": "#abebff",
                "on-tertiary-container": "#005a6b",
                "on-tertiary": "#003641",
                "tertiary-fixed-dim": "#17d8ff",
                "primary-fixed-dim": "#ffba20",
                "on-secondary-container": "#b7b5b4",
                "surface-container-low": "#1c1b1b",
                "tertiary-container": "#00d7fe",
                "secondary-fixed": "#e5e2e1",
                "tertiary-fixed": "#b0ecff",
                "on-error-container": "#ffdad6",
                "outline-variant": "#514532",
                "surface-container-highest": "#353534"
              },
              fontFamily: {
                "headline": ["Space Grotesk"],
                "body": ["Manrope"],
                "label": ["Space Grotesk"]
              },
              borderRadius: {"DEFAULT": "0px", "lg": "0px", "xl": "0px", "full": "9999px"},
            },
          },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface-container-lowest text-on-surface font-body selection:bg-primary-container selection:text-on-primary overflow-hidden">
<!-- Top Status Bar (Shared Component: TopAppBar) -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-8 py-6 bg-transparent">
<div class="flex items-center gap-1 text-amber-500 font-['Space_Grotesk'] font-light tracking-[0.2em] text-[10px] uppercase">
<span class="material-symbols-outlined" data-icon="wifi">wifi</span>
<span>SYSTEM_LIVE</span>
</div>
<div class="flex items-center gap-2 text-amber-500 font-['Space_Grotesk'] font-light tracking-[0.2em] text-[10px] uppercase">
<span>98%</span>
<span class="material-symbols-outlined" data-icon="battery_charging_full" data-weight="fill" style="font-variation-settings: 'FILL' 1;">battery_charging_full</span>
</div>
</header>
<!-- Main Canvas -->
<main class="relative h-screen w-full flex flex-col items-center justify-between py-24 px-10">
<!-- Upper Center: Time Hero -->
<section class="mt-12 flex flex-col items-center">
<h1 class="font-headline font-light text-[84px] tracking-tight text-on-surface opacity-90">
                21:42
            </h1>
<p class="font-label text-[10px] tracking-[0.5em] text-on-surface-variant/60 uppercase -mt-2">
                Tuesday • Oct 24
            </p>
</section>
<!-- Center: The Orb Presence -->
<section class="relative flex flex-col items-center justify-center flex-grow">
<!-- Ambient Glow Layer -->
<div class="absolute w-64 h-64 bg-primary-container/5 rounded-full blur-[60px]"></div>
<!-- The Orb -->
<div class="relative w-24 h-24 flex items-center justify-center">
<!-- Outer Pulse -->
<div class="absolute inset-0 orb-glow rounded-full bg-primary-container/20 blur-2xl"></div>
<!-- Core Orb -->
<div class="z-10 w-4 h-4 rounded-full bg-primary-container shadow-[0_0_25px_rgba(255,184,0,0.8)]"></div>
</div>
<!-- Brand Identity -->
<div class="mt-12 text-center">
<span class="font-headline font-light text-[14px] tracking-[1.2em] text-primary/80 block ml-[1.2em]">
                    GLYPH
                </span>
</div>
</section>
<!-- Bottom: Interaction Hint (Shared Component: BottomNavBar) -->
<footer class="fixed bottom-0 left-0 w-full z-50 flex justify-center items-center pb-10 bg-transparent">
<div class="flex flex-col items-center gap-2 group cursor-pointer transition-all duration-700 hover:scale-110">
<span class="material-symbols-outlined text-amber-500 animate-pulse text-[24px]" data-icon="keyboard_arrow_up">keyboard_arrow_up</span>
<span class="font-label text-[9px] tracking-[0.3em] text-amber-900/40 uppercase">Slide to Access</span>
</div>
</footer>
</main>
<!-- Sidebar Metadata (Status Ribbon - System Unique) -->
<aside class="fixed right-6 top-1/2 -translate-y-1/2 flex flex-col gap-12 opacity-30 select-none">
<div class="vertical-text font-label text-[8px] tracking-widest uppercase rotate-90 origin-center whitespace-nowrap">
            COORD_40.7128_N_74.0060_W
        </div>
<div class="vertical-text font-label text-[8px] tracking-widest uppercase rotate-90 origin-center whitespace-nowrap pt-24">
            ENC_TYPE_QUANTUM_09
        </div>
</aside>
<!-- Left System Ribbon -->
<aside class="fixed left-6 top-1/2 -translate-y-1/2 flex flex-col gap-12 opacity-30 select-none">
<div class="vertical-text font-label text-[8px] tracking-widest uppercase -rotate-90 origin-center whitespace-nowrap">
            OS_VERSION_2.0.4_BETA
        </div>
</aside>
<!-- Subtle Grain Overlay -->
<div class="fixed inset-0 pointer-events-none opacity-[0.03] mix-blend-overlay bg-[url('https://www.transparenttextures.com/patterns/stardust.png')]"></div>
</body></html>
