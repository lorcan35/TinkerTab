<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=720, height=1280"/>
<title>Glyph OS — Home</title>
<link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@200;300;400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  @font-face { font-family: 'SF'; src: local('SF Pro Display'), local('Space Grotesk'); }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 720px; height: 1280px;
    background: #000000;
    color: #ffffff;
    font-family: 'Space Grotesk', -apple-system, sans-serif;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* The screen is a canvas. Black is not empty — it's depth. */

  /* Time — the anchor. Nothing else matters as much. */
  .time {
    position: absolute;
    top: 280px;
    width: 100%;
    text-align: center;
    font-size: 108px;
    font-weight: 200;
    letter-spacing: -0.03em;
    color: #ffffff;
    line-height: 1;
  }
  .date {
    position: absolute;
    top: 400px;
    width: 100%;
    text-align: center;
    font-size: 17px;
    font-weight: 400;
    color: rgba(255,255,255,0.35);
    letter-spacing: 0.02em;
  }

  /* The Orb — Glyph's presence. Not decoration. Presence. */
  .orb-wrap {
    position: absolute;
    top: 490px;
    left: 50%;
    transform: translateX(-50%);
    width: 160px; height: 160px;
  }

  /* Outer breath — barely visible */
  .orb-breath {
    position: absolute;
    inset: -20px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(0,229,255,0.04) 0%, transparent 70%);
    animation: breathe 5s ease-in-out infinite;
  }

  /* The orb itself — a single perfect gradient */
  .orb {
    position: absolute;
    inset: 20px;
    border-radius: 50%;
    background: radial-gradient(
      circle at 45% 40%,
      rgba(0,229,255,0.45) 0%,
      rgba(0,180,210,0.2) 35%,
      rgba(0,120,150,0.06) 60%,
      transparent 80%
    );
    /* The glow is the orb's shadow on the world */
    box-shadow: 0 0 60px rgba(0,229,255,0.12);
  }

  /* A single ring — restraint */
  .orb-ring {
    position: absolute;
    inset: 8px;
    border-radius: 50%;
    border: 0.5px solid rgba(0,229,255,0.12);
    animation: breathe 5s ease-in-out infinite 1s;
  }

  .orb-status {
    position: absolute;
    top: 178px;
    width: 100%;
    text-align: center;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.35em;
    color: rgba(0,229,255,0.4);
    text-transform: uppercase;
  }

  @keyframes breathe {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.06); opacity: 0.6; }
  }

  /* Contextual whispers — not cards. Just information. */
  .context {
    position: absolute;
    bottom: 180px;
    left: 0; right: 0;
    display: flex;
    justify-content: center;
    gap: 64px;
  }
  .context-item {
    text-align: center;
  }
  .context-value {
    font-size: 32px;
    font-weight: 300;
    color: rgba(255,255,255,0.9);
    line-height: 1;
  }
  .context-label {
    font-size: 11px;
    font-weight: 400;
    color: rgba(255,255,255,0.2);
    margin-top: 8px;
    letter-spacing: 0.06em;
  }

  /* AI whisper — a thought, barely there */
  .whisper {
    position: absolute;
    bottom: 112px;
    left: 0; right: 0;
    text-align: center;
    font-size: 13px;
    font-weight: 300;
    color: rgba(255,255,255,0.18);
    padding: 0 80px;
    line-height: 1.5;
  }

  /* Navigation — so minimal it almost isn't there */
  .nav {
    position: absolute;
    bottom: 32px;
    left: 0; right: 0;
    display: flex;
    justify-content: center;
    gap: 48px;
  }
  .nav-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: rgba(255,255,255,0.1);
  }
  .nav-dot.active {
    width: 24px;
    border-radius: 3px;
    background: rgba(255,255,255,0.5);
  }

  /* Page dots — right edge, whisper quiet */
  .page-indicator {
    position: absolute;
    right: 24px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .pip {
    width: 3px; height: 3px;
    border-radius: 50%;
    background: rgba(255,255,255,0.08);
  }
  .pip.active {
    height: 16px;
    border-radius: 2px;
    background: rgba(0,229,255,0.35);
  }

  /* Status — top, barely there */
  .status {
    position: absolute;
    top: 16px;
    left: 0; right: 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 28px;
  }
  .status-left {
    font-size: 12px;
    font-weight: 500;
    color: rgba(255,255,255,0.25);
  }
  .status-right {
    display: flex;
    gap: 6px;
    align-items: center;
  }
  .status-dot {
    width: 4px; height: 4px;
    border-radius: 50%;
    background: rgba(52,211,153,0.5);
  }
  .status-text {
    font-size: 10px;
    color: rgba(255,255,255,0.15);
    letter-spacing: 0.1em;
  }
</style>
</head>
<body>

  <!-- Status — you barely notice it -->
  <div class="status">
    <span class="status-left">Glyph</span>
    <div class="status-right">
      <div class="status-dot"></div>
      <span class="status-text">connected</span>
    </div>
  </div>

  <!-- Time — the reason you glance at it -->
  <div class="time">21:42</div>
  <div class="date">Thursday, March 27</div>

  <!-- The Orb — Glyph is here -->
  <div class="orb-wrap">
    <div class="orb-breath"></div>
    <div class="orb-ring"></div>
    <div class="orb"></div>
    <div class="orb-status">Ready</div>
  </div>

  <!-- Context — just the facts, no containers -->
  <div class="context">
    <div class="context-item">
      <div class="context-value">23°</div>
      <div class="context-label">Clear skies</div>
    </div>
    <div class="context-item">
      <div class="context-value">2:00</div>
      <div class="context-label">Team Sync</div>
    </div>
  </div>

  <!-- Whisper — Glyph's thought -->
  <div class="whisper">Rain expected around 4pm</div>

  <!-- Page indicator -->
  <div class="page-indicator">
    <div class="pip active"></div>
    <div class="pip"></div>
    <div class="pip"></div>
    <div class="pip"></div>
  </div>

  <!-- Bottom nav dots -->
  <div class="nav">
    <div class="nav-dot active"></div>
    <div class="nav-dot"></div>
    <div class="nav-dot"></div>
    <div class="nav-dot"></div>
  </div>

</body>
</html>
