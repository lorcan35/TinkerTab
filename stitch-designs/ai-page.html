<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>

                        "secondary-fixed": "#e5e2e1",
                        "secondary": "#c8c6c5",

                        "on-secondary-fixed-variant": "#474746",
                        "tertiary-container": "#00d7fe",
                        "surface-container-highest": "#353534",

                        "on-primary": "#412d00",
                        "on-secondary-container": "#b7b5b4",
                        "surface-dim": "#131313",
                        "primary-container": "#ffb800",
                        "error-container": "#93000a",
                        "tertiary-fixed-dim": "#17d8ff",

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .breathing-glow {
            box-shadow: 0 0 40px rgba(255, 184, 0, 0.2);
        }
        .scan-line {
            background: linear-gradient(to bottom, transparent 50%, rgba(255, 184, 0, 0.05) 50%);
            background-size: 100% 4px;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-surface-container-lowest text-on-surface font-body selection:bg-primary-container selection:text-on-primary-fixed overflow-hidden h-screen">
<!-- Top Status Bar (TopAppBar Logic) -->
<nav class="fixed top-0 w-full z-50 flex justify-between items-center px-6 py-4 bg-[#0E0E0E] text-sm">
<div class="flex items-center gap-4">
<span class="font-headline font-bold text-on-surface tracking-tighter">21:42</span>
<div class="bg-surface-container-low px-2 py-0.5 border border-outline-variant/30">
<span class="font-headline font-black tracking-widest text-primary-container text-[10px] uppercase">GLYPH</span>
</div>
</div>
<div class="flex items-center gap-3 text-on-surface-variant">
<span class="material-symbols-outlined text-[18px]">wifi</span>
<span class="material-symbols-outlined text-[18px]">signal_cellular_alt</span>
<span class="material-symbols-outlined text-[18px]">battery_charging_full</span>
</div>
</nav>
<!-- Main Content Canvas -->
<main class="relative h-full flex flex-col items-center justify-center scan-line">
<!-- Subtle Ambient Background Light -->
<div class="absolute inset-0 bg-radial-gradient from-primary-container/5 via-transparent to-transparent pointer-events-none"></div>
<!-- Centerpiece: Kinetic Monolith Core -->
<div class="relative flex flex-col items-center">
<!-- Outer Pulsing Ring -->
<div class="absolute w-64 h-64 border border-primary-container/20 rounded-full animate-[pulse_4s_infinite]"></div>
<!-- Inner Glowing Circle -->
<div class="relative w-48 h-48 bg-primary-container flex items-center justify-center rounded-full breathing-glow transition-transform active:scale-95 duration-200">
<span class="material-symbols-outlined text-[#0E0E0E] text-7xl select-none" style="font-variation-settings: 'FILL' 1;">visibility</span>
<!-- Orbiting Data Points (Visual Flair) -->
<div class="absolute w-full h-full border border-on-primary-container/10 rounded-full animate-[spin_12s_linear_infinite]">
<div class="absolute top-0 left-1/2 -translate-x-1/2 w-1.5 h-1.5 bg-on-primary-container rounded-full"></div>
</div>
</div>
<!-- Branding -->
<div class="mt-12 text-center">
<h1 class="font-headline text-2xl font-bold tracking-[0.6rem] text-primary-container uppercase translate-x-[0.3rem]">GLYPH AI</h1>
<div class="mt-2 h-[1px] w-8 bg-primary-container/30 mx-auto"></div>
<p class="mt-4 font-headline text-[10px] text-on-surface-variant tracking-[0.2rem] opacity-60 uppercase">System Neural Link: Active</p>
</div>
</div>
<!-- Bottom Action Hint -->
<div class="absolute bottom-24 flex flex-col items-center gap-2">
<span class="material-symbols-outlined text-primary-container animate-bounce">keyboard_double_arrow_up</span>
<span class="font-headline text-[9px] text-on-surface-variant/40 tracking-widest uppercase">Swipe to Initialize</span>
</div>
</main>
<!-- Page Indicator Sidebar -->
<aside class="fixed right-6 top-1/2 -translate-y-1/2 flex flex-col gap-4 z-40">
<!-- Active Dot -->
<div class="w-2 h-2 bg-primary-container shadow-[0_0_8px_#FFB800]"></div>
<!-- Inactive Dots -->
<div class="w-1.5 h-1.5 bg-surface-container-high border border-outline-variant/30 self-center"></div>
<div class="w-1.5 h-1.5 bg-surface-container-high border border-outline-variant/30 self-center"></div>
<div class="w-1.5 h-1.5 bg-surface-container-high border border-outline-variant/30 self-center"></div>
</aside>
<!-- Bottom Navigation Shell (Minimized for focus) -->
<footer class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center h-16 px-4 bg-[#0E0E0E]/80 backdrop-blur-md border-t border-outline-variant/10">
<div class="flex flex-col items-center justify-center text-primary-container scale-110 drop-shadow-[0_0_8px_#FFB800]">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">home</span>
</div>
<div class="flex flex-col items-center justify-center text-on-surface-variant/50 hover:text-primary-container transition-all">
<span class="material-symbols-outlined">query_stats</span>
</div>
<div class="flex flex-col items-center justify-center text-on-surface-variant/50 hover:text-primary-container transition-all">
<span class="material-symbols-outlined">security</span>
</div>
<div class="flex flex-col items-center justify-center text-on-surface-variant/50 hover:text-primary-container transition-all">
<span class="material-symbols-outlined">settings</span>
</div>
</footer>
<!-- Side Status HUD Elements -->
<div class="fixed left-6 top-1/2 -translate-y-1/2 flex flex-col gap-8 pointer-events-none hidden md:flex">
<div class="rotate-[-90deg] origin-left">
<span class="font-headline text-[9px] text-on-surface-variant/30 tracking-[0.4rem] uppercase whitespace-nowrap">Core_Latency: 0.002ms</span>
</div>
<div class="rotate-[-90deg] origin-left mt-24">
<span class="font-headline text-[9px] text-on-surface-variant/30 tracking-[0.4rem] uppercase whitespace-nowrap">Neural_Load: 14%</span>
</div>
</div>
