<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
            text-transform: none;
            letter-spacing: normal;
            word-wrap: normal;
            white-space: nowrap;
            direction: ltr;
        }
        .ai-glow {
            box-shadow: 0 0 40px 4px rgba(0, 229, 255, 0.15);
        }
        .orb-pulse {
            background: radial-gradient(circle, rgba(0,229,255,0.4) 0%, rgba(0,229,255,0) 70%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-background text-on-surface font-body overflow-hidden flex items-center justify-center min-h-screen">
<!-- Device Frame Simulator (720x1280) -->
<div class="relative w-[720px] h-[1280px] bg-background shadow-2xl flex flex-col overflow-hidden select-none border border-outline-variant/10">
<!-- TopAppBar (From Shared JSON) -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-4 h-12 bg-[#0D0F12]">
<div class="flex items-center gap-2">
<span class="text-on-surface-variant font-headline font-bold text-sm">21:42</span>
</div>
<div class="absolute left-1/2 -translate-x-1/2">
<div class="text-[#00E5FF] font-headline font-bold tracking-[0.2em] px-2 py-0.5 bg-[#00E5FF]/10 rounded-sm text-xs uppercase">GLYPH</div>
</div>
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-[#00E5FF] text-lg" data-icon="schedule">schedule</span>
<span class="material-symbols-outlined text-[#00E5FF] text-lg" data-icon="battery_charging_full">battery_charging_full</span>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 mt-12 mb-24 px-8 relative flex flex-col items-center">
<!-- Side Navigation Indicator (Page Dots) -->
<div class="fixed right-6 top-1/2 -translate-y-1/2 flex flex-col gap-4 items-center z-10">
<div class="w-1.5 h-1.5 rounded-full bg-primary-container"></div>
<div class="w-1.5 h-1.5 rounded-full bg-surface-container-high"></div>
<div class="w-1.5 h-1.5 rounded-full bg-surface-container-high"></div>
<div class="w-1.5 h-1.5 rounded-full bg-surface-container-high"></div>
</div>
<!-- Hero Clock Section -->
<div class="mt-20 text-center">
<h1 class="font-headline text-[120px] font-bold tracking-tighter text-on-surface leading-none">21:42</h1>
<p class="font-headline text-2xl text-outline tracking-tight mt-2">Thursday, March 27</p>
</div>
<!-- AI Status Orb -->
<div class="flex-1 flex flex-col items-center justify-center -mt-10">
<div class="relative w-48 h-48 flex items-center justify-center">
<!-- Ambient Radiation -->
<div class="absolute inset-0 orb-pulse animate-pulse"></div>
<!-- Core Orb -->
<div class="w-32 h-32 rounded-full border-2 border-primary-container/30 flex items-center justify-center p-2 bg-primary-container/5 ai-glow">
<div class="w-full h-full rounded-full bg-primary-container flex items-center justify-center shadow-[0_0_30px_rgba(0,229,255,0.4)]">
<span class="material-symbols-outlined text-background text-4xl" data-icon="auto_awesome" style="font-variation-settings: 'FILL' 1;">auto_awesome</span>
</div>
</div>
<!-- Status Label -->
<div class="absolute -bottom-4 bg-surface-container-high px-4 py-1 rounded-full border border-outline-variant/20">
<span class="text-xs font-headline tracking-[0.2em] text-[#E8ECF1] uppercase">Ready</span>
</div>
</div>
</div>
<!-- Information Layer -->
<div class="w-full space-y-4 mb-8">
<!-- Side-by-Side Cards -->
<div class="grid grid-cols-2 gap-4">
<div class="bg-surface-container-low p-6 rounded-xl border border-outline-variant/10 flex flex-col gap-2">
<div class="flex items-center gap-2 text-outline">
<span class="material-symbols-outlined text-sm" data-icon="thermostat">thermostat</span>
<span class="text-[10px] font-headline uppercase tracking-widest">Weather</span>
</div>
<div class="text-3xl font-headline font-medium">23°C</div>
<div class="text-[10px] text-outline-variant">Clear sky, light breeze</div>
</div>
<div class="bg-surface-container-low p-6 rounded-xl border border-outline-variant/10 flex flex-col gap-2">
<div class="flex items-center gap-2 text-outline">
<span class="material-symbols-outlined text-sm" data-icon="event">event</span>
<span class="text-[10px] font-headline uppercase tracking-widest">Schedule</span>
</div>
<div class="text-lg font-headline font-medium leading-tight">Team Sync</div>
<div class="text-[10px] text-primary-container">2:00 PM • Remote</div>
</div>
</div>
<!-- AI Insight Card -->
<div class="bg-surface-container-low p-6 rounded-xl border border-outline-variant/10 relative overflow-hidden group">
<div class="absolute top-0 right-0 p-3 opacity-20 group-hover:opacity-40 transition-opacity">
<span class="material-symbols-outlined text-4xl" data-icon="cloud_queue">cloud_queue</span>
</div>
<div class="flex items-center gap-2 text-outline mb-2">
<span class="material-symbols-outlined text-sm" data-icon="lightbulb">lightbulb</span>
<span class="text-[10px] font-headline uppercase tracking-widest">AI Insight</span>
</div>
<p class="text-lg text-[#E8ECF1] font-body leading-snug">Rain expected at 4pm. Don't forget your umbrella for the commute.</p>
</div>
</div>
</main>
<!-- BottomNavBar (From Shared JSON) -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-6 pb-8 pt-4 bg-[#0D0F12]/80 backdrop-blur-xl rounded-t-lg shadow-[0_-4px_40px_rgba(0,229,255,0.06)]">
<!-- Home (Active) -->
<button class="flex flex-col items-center justify-center text-[#00E5FF] bg-[#00E5FF]/10 rounded-xl p-3 scale-110 active:scale-95 transition-all duration-200">
<span class="material-symbols-outlined text-2xl" data-icon="home" style="font-variation-settings: 'FILL' 1;">home</span>
<span class="font-headline text-[10px] uppercase tracking-widest mt-1">Home</span>
</button>
<!-- Grid View -->
<button class="flex flex-col items-center justify-center text-slate-500 p-3 hover:bg-white/5 transition-all active:scale-95 duration-200">
<span class="material-symbols-outlined text-2xl" data-icon="grid_view">grid_view</span>
<span class="font-headline text-[10px] uppercase tracking-widest mt-1">Apps</span>
</button>
<!-- Dragon (AI) -->
<button class="flex flex-col items-center justify-center text-slate-500 p-3 hover:bg-white/5 transition-all active:scale-95 duration-200">
<span class="material-symbols-outlined text-2xl" data-icon="auto_awesome">auto_awesome</span>
<span class="font-headline text-[10px] uppercase tracking-widest mt-1">Core</span>
</button>
<!-- Settings -->
<button class="flex flex-col items-center justify-center text-slate-500 p-3 hover:bg-white/5 transition-all active:scale-95 duration-200">
<span class="material-symbols-outlined text-2xl" data-icon="settings">settings</span>
<span class="font-headline text-[10px] uppercase tracking-widest mt-1">Sys</span>
</button>
</nav>
<!-- Aesthetic Texture (Technical Ambientism) -->
<div class="pointer-events-none absolute inset-0 opacity-[0.03] overflow-hidden">
<div class="absolute top-0 left-0 w-full h-full" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuAyxWobufboEEGPC6Ulb9TbSvWjnZHJgM4XuZBAjly2nlLnQ7R9nW_3zn5kL4JXw9CI5m_FczimPHwQJg3JIsumYGFb--aiwO4kf5Dorq71154ji2maCmO_GrixrL5r2r0vwAkdQBZvgzXHK4h0qoPxD1Y3adt_4Bxvi6Et5s9KEM_F1ThIMJWGhC1g7O3i5ghal4xToDBzS7m9mlkitw-VUlaE7lOYXoAqJz2Ake0MsVqfJ4wL2v2iC42XtysFa20Dguh9eN6XUV4');"></div>
</div>
</div>
</body></html>
