<style>
        body {
            width: 720px;
            height: 1280px;
            margin: 0 auto;
            overflow: hidden;
            background-color: #0c0e11;
            position: relative;

        .material-symbols-outlined {

<div class="absolute inset-0 z-0">

                &gt; stream established @ 24fps<br/>
                &gt; monitoring neural bypass... active
            </div>
</div>

<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-on-surface">menu</span>
<div class="flex flex-col">
<h1 class="text-[#e0e6f1] font-bold tracking-tighter font-headline text-lg uppercase leading-tight">Dragon</h1>
<div class="flex items-center gap-1.5">
<div class="w-1.5 h-1.5 rounded-full bg-[#00E5FF] shadow-[0_0_8px_#00E5FF]"></div>
<span class="text-[10px] font-bold tracking-widest text-primary uppercase">Connected</span>
</div>
</div>
</div>
<div class="flex items-center gap-3">
<div class="px-3 py-1 rounded-full bg-primary/10 border border-primary/20">

</div>
</div>
</header>

<div class="w-32 h-32 rounded-full border border-primary/20 flex items-center justify-center">

</div>
</div>
</div>

<div class="active-dot"></div>
</div>
<div class="inactive-dot"></div>
<div class="inactive-dot"></div>
</div>

</button>
<!-- Keyboard (Inactive) -->

<span class="material-symbols-outlined text-2xl">keyboard</span>
<span class="font-body text-[10px] uppercase tracking-widest mt-1">Keys</span>
</button>
<!-- Mouse (Active Destination) -->

<span class="font-body text-[10px] uppercase tracking-widest mt-1">Mouse</span>
</button>

<span class="material-symbols-outlined text-2xl">extension</span>
<span class="font-body text-[10px] uppercase tracking-widest mt-1">Action</span>
</button>
