<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Inter:wght@300;400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface-container-high": "#2a2a2a",
              "surface-container-lowest": "#0e0e0e",
              "surface-container": "#201f1f",
              "background": "#0D0D0D",
              "primary": "#ffdca1",
              "secondary-fixed": "#e5e2e1",
              "on-secondary-fixed-variant": "#474746",
              "inverse-surface": "#e5e2e1",
              "error-container": "#93000a",
              "surface-dim": "#131313",
              "on-surface-variant": "#d5c4ab",
              "surface-container-low": "#1c1b1b",
              "inverse-on-surface": "#313030",
              "tertiary": "#abebff",
              "on-tertiary-fixed": "#001f27",
              "on-error": "#690005",
              "on-primary-container": "#6b4c00",
              "secondary": "#c8c6c5",
              "inverse-primary": "#7c5800",
              "primary-fixed": "#ffdea8",
              "outline": "#9e8f78",
              "surface": "#131313",
              "secondary-fixed-dim": "#c8c6c5",
              "tertiary-container": "#00d7fe",
              "on-secondary": "#313030",
              "on-primary": "#412d00",
              "tertiary-fixed": "#b0ecff",
              "on-tertiary-fixed": "#001f27",
              "on-primary-fixed": "#271900",
              "primary-fixed-dim": "#ffba20",
              "on-tertiary-container": "#005a6b",
              "on-tertiary-fixed-variant": "#004e5d",
              "error": "#ffb4ab",
              "tertiary-fixed-dim": "#17d8ff",
              "surface-bright": "#3a3939",
              "surface-tint": "#ffba20",
              "on-error-container": "#ffdad6",
              "outline-variant": "#514532",
              "on-tertiary": "#003641",
              "on-primary-fixed-variant": "#5e4200",
              "primary-container": "#ffb800",
              "on-surface": "#e5e2e1",
              "secondary-container": "#474746",
              "on-secondary-fixed": "#1c1b1b",
              "surface-variant": "#353534",
              "on-secondary-container": "#b7b5b4",
              "surface-container-highest": "#353534",
              "on-background": "#e5e2e1"
            },
            fontFamily: {
              "headline": ["Space Grotesk"],
              "body": ["Inter"],
              "label": ["Space Grotesk"]
            },
            borderRadius: {"DEFAULT": "0px", "lg": "0px", "xl": "0px", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #0D0D0D;
            color: #e5e2e1;
            font-family: 'Inter', sans-serif;
        }
        .custom-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 14px;
        }
        .tool-tile {
            background-color: #242424;
            height: 140px;
            position: relative;
            padding: 1.25rem;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="flex flex-col min-h-screen max-w-[720px] mx-auto overflow-hidden">
<!-- Top Navigation Bar (Shared Component Strategy) -->
<header class="flex justify-between items-center w-full px-6 py-4 bg-[#0E0E0E] z-50">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-amber-500" data-icon="terminal">terminal</span>
<span class="font-['Space_Grotesk'] tracking-[0.05rem] uppercase text-xl font-bold tracking-widest text-amber-500">GLYPHOS_SYSTEM_CORE</span>
</div>
<div class="w-8 h-8 bg-surface-container-high flex items-center justify-center">
<span class="material-symbols-outlined text-amber-400 text-sm" data-icon="person">person</span>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow px-6 py-4 relative">
<!-- Dashboard Header -->
<div class="mb-8">
<h1 class="font-headline text-2xl font-bold tracking-[0.3em] text-amber-500 uppercase">TOOLS</h1>
</div>
<!-- 2x3 Grid Layout -->
<div class="custom-grid">
<!-- WIFI Tile -->
<div class="tool-tile">
<div class="absolute top-0 left-0 right-0 h-[2px] bg-[#34D399]"></div>
<div class="flex justify-between items-start">
<span class="text-on-surface-variant font-label text-[10px] tracking-widest uppercase">WIFI</span>
<span class="material-symbols-outlined text-[#34D399] text-lg" data-icon="wifi">wifi</span>
</div>
<div class="text-white font-headline text-xl font-medium tracking-tight">CONNECTED</div>
</div>
<!-- BATTERY Tile -->
<div class="tool-tile">
<div class="absolute top-0 left-0 right-0 h-[2px] bg-primary-container"></div>
<div class="flex justify-between items-start">
<span class="text-on-surface-variant font-label text-[10px] tracking-widest uppercase">BATTERY</span>
<span class="material-symbols-outlined text-primary-container text-lg" data-icon="battery_charging_full" data-weight="fill" style="font-variation-settings: 'FILL' 1;">battery_charging_full</span>
</div>
<div class="text-white font-headline text-3xl font-light">98%</div>
</div>
<!-- MEMORY Tile -->
<div class="tool-tile">
<div class="absolute top-0 left-0 right-0 h-[2px] bg-[#00B4D8]"></div>
<div class="flex justify-between items-start">
<span class="text-on-surface-variant font-label text-[10px] tracking-widest uppercase">MEMORY</span>
<span class="material-symbols-outlined text-[#00B4D8] text-lg" data-icon="memory">memory</span>
</div>
<div class="text-white font-headline text-3xl font-light">4.2 <span class="text-sm">GB</span></div>
</div>
<!-- DRAGON Tile -->
<div class="tool-tile">
<div class="absolute top-0 left-0 right-0 h-[2px] bg-[#00B4D8]"></div>
<div class="flex justify-between items-start">
<span class="text-on-surface-variant font-label text-[10px] tracking-widest uppercase">DRAGON</span>
<span class="material-symbols-outlined text-[#00B4D8] text-lg" data-icon="rocket_launch">rocket_launch</span>
</div>
<div class="text-white font-headline text-xl font-medium tracking-tight">ACTIVE</div>
</div>
<!-- FPS Tile -->
<div class="tool-tile">
<div class="absolute top-0 left-0 right-0 h-[2px] bg-[#00E5A0]"></div>
<div class="flex justify-between items-start">
<span class="text-on-surface-variant font-label text-[10px] tracking-widest uppercase">FPS</span>
<span class="material-symbols-outlined text-[#00E5A0] text-lg" data-icon="speed">speed</span>
</div>
<div class="text-white font-headline text-3xl font-light">120</div>
</div>
<!-- CLOCK Tile -->
<div class="tool-tile">
<div class="absolute top-0 left-0 right-0 h-[2px] bg-primary-container"></div>
<div class="flex justify-between items-start">
<span class="text-on-surface-variant font-label text-[10px] tracking-widest uppercase">CLOCK</span>
<span class="material-symbols-outlined text-primary-container text-lg" data-icon="schedule">schedule</span>
</div>
<div class="text-white font-headline text-3xl font-light">21:42</div>
</div>
</div>
<!-- Vertical Page Indicators -->
<div class="absolute right-4 top-1/2 -translate-y-1/2 flex flex-col gap-3">
<div class="w-1.5 h-1.5 bg-surface-container-highest"></div>
<div class="w-1.5 h-1.5 bg-primary-container shadow-[0_0_8px_rgba(255,184,0,0.6)]"></div>
<div class="w-1.5 h-1.5 bg-surface-container-highest"></div>
<div class="w-1.5 h-1.5 bg-surface-container-highest"></div>
</div>
</main>
<!-- Visual Texture / Background Detail -->
<div class="fixed inset-0 pointer-events-none opacity-5 mix-blend-overlay overflow-hidden">
<div class="absolute inset-0 bg-[radial-gradient(circle_at_50%_50%,_#FFB800_0%,_transparent_70%)] opacity-20"></div>
</div>
<!-- Bottom Navigation Bar (Shared Component Strategy) -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center bg-[#0E0E0E] shadow-[0_-4px_20px_rgba(255,184,0,0.06)]">
<a class="flex flex-col items-center justify-center text-[#D5C4AB] p-4 hover:bg-[#2A2A2A] transition-all" href="#">
<span class="material-symbols-outlined" data-icon="grid_view">grid_view</span>
</a>
<a class="flex flex-col items-center justify-center bg-amber-500 text-[#0E0E0E] p-4" href="#">
<span class="material-symbols-outlined" data-icon="analytics" data-weight="fill" style="font-variation-settings: 'FILL' 1;">analytics</span>
</a>
<a class="flex flex-col items-center justify-center text-[#D5C4AB] p-4 hover:bg-[#2A2A2A] transition-all" href="#">
<span class="material-symbols-outlined" data-icon="security">security</span>
</a>
<a class="flex flex-col items-center justify-center text-[#D5C4AB] p-4 hover:bg-[#2A2A2A] transition-all" href="#">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
</a>
</nav>
</body></html>
