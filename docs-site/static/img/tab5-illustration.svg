<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 600" fill="none"
     font-family="JetBrains Mono, monospace" font-size="9" letter-spacing="0.08em">
  <defs>
    <!-- Subtle ink-on-paper inset for the screen -->
    <linearGradient id="screen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#1a1612"/>
      <stop offset="100%" stop-color="#27201b"/>
    </linearGradient>
    <radialGradient id="orbCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#3dff8c"/>
      <stop offset="55%" stop-color="#0e5c3f"/>
      <stop offset="100%" stop-color="#07371f"/>
    </radialGradient>
    <pattern id="micGrille" width="4" height="4" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="0.7" fill="#6b5d4e"/>
    </pattern>
  </defs>

  <!-- ──────────────────────────────────────────────────────── -->
  <!-- Pointer lines (drawn first so they sit BEHIND the device) -->
  <!-- ──────────────────────────────────────────────────────── -->
  <g stroke="#1a1612" stroke-width="0.7" stroke-linecap="square">
    <!-- speaker grille (left side) -->
    <line x1="48"  y1="290" x2="100" y2="290"/>
    <circle cx="48" cy="290" r="1.5" fill="#1a1612"/>
    <!-- camera eye (top right) -->
    <line x1="430" y1="92"  x2="380" y2="92"/>
    <circle cx="430" cy="92" r="1.5" fill="#1a1612"/>
    <!-- voice orb (right middle) -->
    <line x1="445" y1="305" x2="320" y2="305"/>
    <circle cx="445" cy="305" r="1.5" fill="#0e5c3f"/>
    <!-- mic array (bottom left) -->
    <line x1="40"  y1="510" x2="142" y2="455"/>
    <circle cx="40" cy="510" r="1.5" fill="#1a1612"/>
    <!-- module13.2 stack (top, behind device) -->
    <line x1="240" y1="14"  x2="240" y2="40"/>
    <circle cx="240" cy="14" r="1.5" fill="#c8553b"/>
    <!-- grove port (right side) -->
    <line x1="445" y1="185" x2="350" y2="185"/>
    <circle cx="445" cy="185" r="1.5" fill="#b87333"/>
  </g>

  <!-- ──────────────────────────────────────────────────────── -->
  <!-- Pointer labels                                           -->
  <!-- ──────────────────────────────────────────────────────── -->
  <g fill="#1a1612" text-transform="uppercase">
    <!-- speaker -->
    <text x="44" y="284" text-anchor="end" fill="#1a1612">[ A ]</text>
    <text x="44" y="296" text-anchor="end" fill="#6b5d4e">3W ES8388</text>

    <!-- camera -->
    <text x="434" y="86" text-anchor="start" fill="#1a1612">[ B ]</text>
    <text x="434" y="98" text-anchor="start" fill="#6b5d4e">SC202CS · 2 MP</text>

    <!-- orb -->
    <text x="449" y="299" text-anchor="start" fill="#0e5c3f">[ C ]</text>
    <text x="449" y="311" text-anchor="start" fill="#6b5d4e">VOICE ORB · PTT</text>

    <!-- mic array -->
    <text x="36" y="504" text-anchor="end" fill="#1a1612">[ D ]</text>
    <text x="36" y="516" text-anchor="end" fill="#6b5d4e">ES7210 · 4-MIC TDM</text>

    <!-- module 13.2 -->
    <text x="244" y="9" text-anchor="start" fill="#c8553b">[ E ]</text>
    <text x="218" y="9" text-anchor="end" fill="#6b5d4e">MODULE13.2 STACK</text>

    <!-- grove -->
    <text x="449" y="179" text-anchor="start" fill="#b87333">[ F ]</text>
    <text x="449" y="191" text-anchor="start" fill="#6b5d4e">GROVE I2C · PORT A</text>
  </g>

  <!-- ──────────────────────────────────────────────────────── -->
  <!-- Module 13.2 stub (top) - shown as a small notch          -->
  <!-- ──────────────────────────────────────────────────────── -->
  <rect x="190" y="32" width="100" height="14" fill="#1a1612" opacity="0.22" rx="1"/>
  <rect x="195" y="36" width="90"  height="6"  fill="#1a1612" opacity="0.45" rx="1"/>

  <!-- ──────────────────────────────────────────────────────── -->
  <!-- Tab5 device — bezel + screen                             -->
  <!-- ──────────────────────────────────────────────────────── -->
  <g>
    <!-- outer bezel -->
    <rect x="105" y="48" width="270" height="500" rx="22"
          fill="#27201b" stroke="#1a1612" stroke-width="1.2"/>
    <!-- screen surface -->
    <rect x="120" y="68" width="240" height="460" rx="10" fill="url(#screen)"/>

    <!-- viewport status bar -->
    <text x="135" y="86" fill="#a89f8f" font-size="8">10:30</text>
    <circle cx="343" cy="83" r="2" fill="#3dff8c"/>
    <text x="328" y="86" fill="#a89f8f" font-size="8" text-anchor="end">LAN</text>

    <!-- greeting -->
    <text x="135" y="138" fill="#ede4d0" font-family="Fraunces, serif"
          font-size="18" font-weight="600" letter-spacing="-0.01em">Good morning.</text>
    <text x="135" y="156" fill="#a89f8f" font-size="9"
          font-family="Newsreader, serif" font-style="italic">Tap the orb to begin.</text>

    <!-- Voice ORB (centerpiece) -->
    <g>
      <!-- outer halo -->
      <circle cx="240" cy="305" r="92" fill="none"
              stroke="#3dff8c" stroke-opacity="0.10" stroke-width="1"/>
      <circle cx="240" cy="305" r="74" fill="none"
              stroke="#3dff8c" stroke-opacity="0.20" stroke-width="1"/>
      <circle cx="240" cy="305" r="60" fill="url(#orbCore)"/>
      <!-- inner highlight -->
      <ellipse cx="225" cy="290" rx="14" ry="9" fill="#a8ffd0" opacity="0.35"/>
    </g>

    <!-- now-card -->
    <rect x="135" y="438" width="210" height="56" rx="6"
          fill="#1a1612" stroke="#3a322a" stroke-width="0.8"/>
    <circle cx="155" cy="466" r="9" fill="#0e5c3f" fill-opacity="0.30"/>
    <circle cx="155" cy="466" r="5" fill="#3dff8c" fill-opacity="0.85"/>
    <text x="172" y="461" fill="#ede4d0" font-family="Fraunces, serif"
          font-size="10" font-weight="600">Coffee timer</text>
    <text x="172" y="476" fill="#a89f8f" font-size="8">3:00 remaining</text>
    <text x="335" y="461" fill="#a89f8f" font-size="7" text-anchor="end">FIG.I.A</text>

    <!-- home button hint -->
    <rect x="225" y="525" width="30" height="2" rx="1" fill="#4a4135"/>
  </g>

  <!-- ──────────────────────────────────────────────────────── -->
  <!-- Plate footer — registration marks + caption             -->
  <!-- ──────────────────────────────────────────────────────── -->
  <g stroke="#1a1612" stroke-width="0.6">
    <!-- registration cross marks -->
    <g transform="translate(16, 16)">
      <line x1="0" y1="6" x2="12" y2="6"/>
      <line x1="6" y1="0" x2="6" y2="12"/>
      <circle cx="6" cy="6" r="3" fill="none"/>
    </g>
    <g transform="translate(452, 16)">
      <line x1="0" y1="6" x2="12" y2="6"/>
      <line x1="6" y1="0" x2="6" y2="12"/>
      <circle cx="6" cy="6" r="3" fill="none"/>
    </g>
    <g transform="translate(16, 568)">
      <line x1="0" y1="6" x2="12" y2="6"/>
      <line x1="6" y1="0" x2="6" y2="12"/>
      <circle cx="6" cy="6" r="3" fill="none"/>
    </g>
    <g transform="translate(452, 568)">
      <line x1="0" y1="6" x2="12" y2="6"/>
      <line x1="6" y1="0" x2="6" y2="12"/>
      <circle cx="6" cy="6" r="3" fill="none"/>
    </g>
  </g>

  <!-- ──────────────────────────────────────────────────────── -->
  <!-- Bottom plate text                                        -->
  <!-- ──────────────────────────────────────────────────────── -->
  <text x="40"  y="582" fill="#6b5d4e" font-size="7.5">M5STACK · TAB5 · ESP32-P4</text>
  <text x="240" y="582" fill="#6b5d4e" font-size="7.5" text-anchor="middle">FIG. I — DEVICE OVERVIEW</text>
  <text x="440" y="582" fill="#6b5d4e" font-size="7.5" text-anchor="end">130×80×17 MM · 210 G</text>
</svg>
