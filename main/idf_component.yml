dependencies:
  idf: '>=5.4.3'
  lvgl/lvgl: ~9.2
  esp_lcd_touch_st7123:
    version: '>=1.0.0'
  espressif/esp_hosted:
    version: 1.4.0
  espressif/esp_wifi_remote:
    version: 0.8.5
  espressif/mdns: '*'
  espressif/esp_codec_dev: '*'
  # esp_websocket_client replaces our hand-rolled esp_transport_ws state
  # machine — see issue #76. Event-driven with built-in auto-reconnect,
  # ping/pong, and TLS. Eliminates the register-before-receive-task race.
  espressif/esp_websocket_client: ^1.6.1
  # esp_audio_codec (#262): OPUS encoder/decoder for the voice WS path.
  # 16 kHz mono PCM <-> ~24 kbps OPUS = ~10x bandwidth cut on the mic
  # uplink and TTS downlink.
  #
  # 2.5.0 (released 2026-04-29) is the next version after the 2.4.1
  # baseline that was crashing inside silk_NSQ_c on the encoder path
  # (TT #264).  Bumping here is investigation step 3 from the issue
  # ("Check esp_audio_codec 2.5+ release notes for ESP32-P4 SILK fixes").
  espressif/esp_audio_codec: ^2.5.0
